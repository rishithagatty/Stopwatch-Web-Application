<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stopwatch Web Application</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* BODY */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to right,#141e30,#243b55);
}

/* CONTAINER */
.container{
    background:white;
    padding:40px;
    width:400px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* TITLE */
.container h1{
    margin-bottom:20px;
    color:#222;
}

/* TIME DISPLAY */
#display{
    font-size:50px;
    font-weight:bold;
    margin-bottom:30px;
    color:#111;
}

/* BUTTONS */
.buttons button{
    padding:12px 20px;
    margin:8px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

/* START BUTTON */
.start{
    background:#28a745;
    color:white;
}

/* PAUSE BUTTON */
.pause{
    background:#ffc107;
    color:black;
}

/* RESET BUTTON */
.reset{
    background:#dc3545;
    color:white;
}

/* LAP BUTTON */
.lap{
    background:#007bff;
    color:white;
}

/* HOVER EFFECT */
.buttons button:hover{
    transform:scale(1.05);
}

/* LAP TIMES */
#laps{
    margin-top:25px;
    text-align:left;
    max-height:200px;
    overflow-y:auto;
}

/* EACH LAP */
#laps li{
    background:#f2f2f2;
    padding:10px;
    margin-bottom:10px;
    border-radius:5px;
    list-style:none;
}

</style>
</head>
<body>

<div class="container">

    <h1>⏱ Stopwatch</h1>

    <!-- TIME DISPLAY -->
    <div id="display">00:00:00</div>

    <!-- BUTTONS -->
    <div class="buttons">

        <button class="start" onclick="startStopwatch()">Start</button>

        <button class="pause" onclick="pauseStopwatch()">Pause</button>

        <button class="reset" onclick="resetStopwatch()">Reset</button>

        <button class="lap" onclick="recordLap()">Lap</button>

    </div>

    <!-- LAP TIMES -->
    <ul id="laps"></ul>

</div>

<script>

/* VARIABLES */
let seconds = 0;
let minutes = 0;
let hours = 0;

let timer = null;

/* DISPLAY */
const display = document.getElementById("display");

/* START FUNCTION */
function startStopwatch(){

    /* PREVENT MULTIPLE TIMERS */
    if(timer !== null){
        return;
    }

    timer = setInterval(updateTime,1000);
}

/* UPDATE TIME */
function updateTime(){

    seconds++;

    if(seconds == 60){
        seconds = 0;
        minutes++;
    }

    if(minutes == 60){
        minutes = 0;
        hours++;
    }

    let h = hours < 10 ? "0" + hours : hours;
    let m = minutes < 10 ? "0" + minutes : minutes;
    let s = seconds < 10 ? "0" + seconds : seconds;

    display.innerHTML = `${h}:${m}:${s}`;
}

/* PAUSE FUNCTION */
function pauseStopwatch(){

    clearInterval(timer);

    timer = null;
}

/* RESET FUNCTION */
function resetStopwatch(){

    clearInterval(timer);

    timer = null;

    seconds = 0;
    minutes = 0;
    hours = 0;

    display.innerHTML = "00:00:00";

    document.getElementById("laps").innerHTML = "";
}

/* RECORD LAP */
function recordLap(){

    if(display.innerHTML === "00:00:00"){
        return;
    }

    const lapList = document.getElementById("laps");

    const lapItem = document.createElement("li");

    lapItem.innerHTML = "Lap: " + display.innerHTML;

    lapList.appendChild(lapItem);
}

</script>

</body>
</html>
